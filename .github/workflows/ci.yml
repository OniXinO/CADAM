name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck / lint / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build expects these to be defined; supply harmless local-style defaults
          # so a fresh fork can still verify the pipeline without prod secrets.
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_POSTHOG_PROJECT_KEY: ci-placeholder-posthog
          VITE_SENTRY_ENVIRONMENT: ci
          VITE_SENTRY_DSN: ''
